<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trey's Dashboard - Working Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .status {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }

        .item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .item-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: #ffd700;
        }

        .item-from {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .item-snippet {
            font-size: 0.85em;
            opacity: 0.7;
            line-height: 1.4;
        }

        .item-time {
            font-size: 0.8em;
            opacity: 0.6;
            margin-top: 8px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
            font-size: 1.2em;
        }

        .empty {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Trey's Dashboard</h1>
            <div class="status" id="status">Connecting to Supabase...</div>
        </div>

        <div class="actions">
            <button class="btn" onclick="refreshEmails()">
                📧 Refresh Emails
            </button>
            <button class="btn" onclick="refreshCalendar()">
                📅 Refresh Calendar
            </button>
            <button class="btn" onclick="syncAll()">
                🔄 Sync Everything
            </button>
            <button class="btn" onclick="loadFromSupabase()">
                💾 Load from Database
            </button>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📧 Recent Emails <span class="count" id="email-count">0</span></h2>
                <div id="emails">
                    <div class="loading">Loading emails...</div>
                </div>
            </div>

            <div class="card">
                <h2>📅 Upcoming Events <span class="count" id="event-count">0</span></h2>
                <div id="events">
                    <div class="loading">Loading events...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://ceubhminnsfgrsiootoq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNldWJobWlubnNmZ3JzaW9vdG9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg0MTY5OTQsImV4cCI6MjA3Mzk5Mjk5NH0.a01TpLtDl8VTFL5RuqMkeyRHzO-iBfIxY-YQibWjvsY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Webhook endpoints
        const WEBHOOK_BASE = window.location.hostname === 'localhost'
            ? 'https://agenda-dashboard.pages.dev'
            : '';

        function updateStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.color = isError ? '#ff6b6b' : '#4fc3f7';
        }

        async function loadFromSupabase() {
            updateStatus('Loading data from Supabase...');

            try {
                // Load emails
                const { data: emails, error: emailError } = await supabase
                    .from('emails')
                    .select('*')
                    .order('timestamp', { ascending: false })
                    .limit(10);

                if (emailError) throw emailError;

                // Load calendar events
                const { data: events, error: eventError } = await supabase
                    .from('calendar_events')
                    .select('*')
                    .order('start', { ascending: true })
                    .limit(10);

                if (eventError) throw eventError;

                // Display emails
                const emailsDiv = document.getElementById('emails');
                const emailCount = document.getElementById('email-count');

                if (!emails || emails.length === 0) {
                    emailsDiv.innerHTML = '<div class="empty">No emails found. Click "Refresh Emails" to sync.</div>';
                    emailCount.textContent = '0';
                } else {
                    emailsDiv.innerHTML = '';
                    emailCount.textContent = emails.length;

                    emails.forEach(email => {
                        const item = document.createElement('div');
                        item.className = 'item';
                        item.innerHTML = `
                            <div class="item-title">${email.subject || 'No Subject'}</div>
                            <div class="item-from">From: ${email.from_email || 'Unknown'}</div>
                            <div class="item-snippet">${(email.snippet || email.body_plain || email.body || '').substring(0, 100)}...</div>
                            <div class="item-time">${new Date(email.timestamp).toLocaleString()}</div>
                        `;
                        emailsDiv.appendChild(item);
                    });
                }

                // Display events
                const eventsDiv = document.getElementById('events');
                const eventCount = document.getElementById('event-count');

                if (!events || events.length === 0) {
                    eventsDiv.innerHTML = '<div class="empty">No events found. Click "Refresh Calendar" to sync.</div>';
                    eventCount.textContent = '0';
                } else {
                    eventsDiv.innerHTML = '';
                    eventCount.textContent = events.length;

                    events.forEach(event => {
                        const item = document.createElement('div');
                        item.className = 'item';
                        item.innerHTML = `
                            <div class="item-title">${event.summary || 'No Title'}</div>
                            <div class="item-from">${event.location || 'No location'}</div>
                            <div class="item-time">
                                Start: ${new Date(event.start).toLocaleString()}<br>
                                End: ${new Date(event.end).toLocaleString()}
                            </div>
                        `;
                        eventsDiv.appendChild(item);
                    });
                }

                updateStatus(`Loaded ${emails.length} emails and ${events.length} events`);
            } catch (error) {
                console.error('Error loading from Supabase:', error);
                updateStatus('Error loading data: ' + error.message, true);
            }
        }

        async function refreshEmails() {
            updateStatus('Refreshing emails from Gmail...');

            try {
                const response = await fetch(`${WEBHOOK_BASE}/api/webhook/emails`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'refresh', limit: 20 })
                });

                const data = await response.json();
                console.log('Email webhook response:', data);

                // Wait for data to be saved to Supabase
                setTimeout(() => {
                    loadFromSupabase();
                    updateStatus('Emails refreshed successfully!');
                }, 2000);
            } catch (error) {
                console.error('Error refreshing emails:', error);
                updateStatus('Error refreshing emails: ' + error.message, true);
            }
        }

        async function refreshCalendar() {
            updateStatus('Refreshing calendar from Google...');

            try {
                const response = await fetch(`${WEBHOOK_BASE}/api/webhook/calendar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'sync', days: 7 })
                });

                const data = await response.json();
                console.log('Calendar webhook response:', data);

                // Wait for data to be saved to Supabase
                setTimeout(() => {
                    loadFromSupabase();
                    updateStatus('Calendar refreshed successfully!');
                }, 2000);
            } catch (error) {
                console.error('Error refreshing calendar:', error);
                updateStatus('Error refreshing calendar: ' + error.message, true);
            }
        }

        async function syncAll() {
            updateStatus('Syncing all data...');

            await Promise.all([
                refreshEmails(),
                refreshCalendar()
            ]);

            setTimeout(() => {
                loadFromSupabase();
                updateStatus('All data synced successfully!');
            }, 3000);
        }

        // Load data on page load
        window.onload = () => {
            loadFromSupabase();
        };
    </script>
</body>
</html>
