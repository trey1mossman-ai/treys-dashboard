name: Deploy Dashboard

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '18.x'

jobs:
  # Job 1: Test and Build
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run TypeScript check
        run: npm run typecheck
        
      - name: Run tests
        run: npm test -- --run --coverage
        
      - name: Upload test coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}KB"
          if [ $BUNDLE_SIZE -gt 400 ]; then
            echo "Bundle size exceeds 400KB limit!"
            exit 1
          fi
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # Job 2: Performance Audit
  lighthouse-audit:
    name: Lighthouse Performance Audit
    needs: test-and-build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: dist/
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install serve
        run: npm install -g serve
        
      - name: Start server
        run: |
          serve -s dist -l 3000 &
          sleep 5
          
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:3000
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
          
      - name: Validate Lighthouse scores
        run: |
          # Extract scores from lighthouse results
          PERF_SCORE=$(cat .lighthouseci/*.json | jq '.categories.performance.score * 100' | head -1)
          
          echo "Performance score: ${PERF_SCORE}"
          
          if (( $(echo "$PERF_SCORE < 95" | bc -l) )); then
            echo "Performance score below 95 threshold!"
            exit 1
          fi

  # Job 3: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    needs: [test-and-build, lighthouse-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: dist/
          
      - name: Deploy to Vercel (Staging)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./dist
          alias-domains: staging-dashboard.vercel.app
          
      - name: Health check
        run: |
          sleep 10
          curl -f ${{ steps.deploy.outputs.url }} || exit 1
          
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployed to staging: ${{ steps.deploy.outputs.url }}'
            })

  # Job 4: Deploy to Production
  deploy-production:
    name: Deploy to Production
    needs: [test-and-build, lighthouse-audit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: dist/
          
      - name: Create backup tag
        run: |
          BACKUP_TAG="backup-$(date +%Y%m%d-%H%M%S)"
          git tag -a $BACKUP_TAG -m "Pre-deployment backup"
          git push origin $BACKUP_TAG
          
      - name: Deploy to Vercel (Production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN_PROD }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
          working-directory: ./dist
          vercel-args: '--prod'
          
      - name: Health check
        run: |
          sleep 15
          curl -f ${{ steps.deploy.outputs.url }}/health || exit 1
          
      - name: Create release tag
        run: |
          RELEASE_TAG="release-$(date +%Y%m%d-%H%M%S)"
          git tag -a $RELEASE_TAG -m "Production release"
          git push origin $RELEASE_TAG
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Production Release
          body: |
            ## 🚀 Production Deployment
            
            **URL:** ${{ steps.deploy.outputs.url }}
            **Time:** $(date)
            
            ### Changes
            - See commit history since last release
            
            ### Performance Metrics
            - Lighthouse Score: 95+
            - Bundle Size: < 400KB
            - TTI: < 1.5s
          draft: false
          prerelease: false

  # Job 5: E2E Tests (Post-deployment)
  e2e-tests:
    name: E2E Tests
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install chromium
          
      - name: Run E2E tests
        run: npx playwright test
        env:
          BASE_URL: https://staging-dashboard.vercel.app
          
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Job 6: Notify Team
  notify:
    name: Notify Team
    needs: [deploy-production]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Send Slack notification
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🎉 Production deployment successful!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          
      - name: Send failure notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '❌ Deployment failed! Check GitHub Actions for details.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
