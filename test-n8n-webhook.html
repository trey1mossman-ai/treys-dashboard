<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Webhook Test - Agenda Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: 500;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .response-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        .email-list {
            margin-top: 20px;
        }
        .email-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .email-from {
            color: #667eea;
            font-weight: bold;
        }
        .email-subject {
            font-size: 18px;
            margin: 5px 0;
        }
        .email-snippet {
            color: #666;
            font-style: italic;
        }
        .email-time {
            color: #999;
            font-size: 12px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 n8n Webhook Test - Agenda Dashboard</h1>
        
        <div id="status" class="status info">
            Ready to test n8n webhook connection
        </div>

        <div>
            <button onclick="testWebhook()">🧪 Test Webhook</button>
            <button onclick="testEmailDigest()">📧 Test Email Digest</button>
            <button onclick="clearResults()">🗑️ Clear</button>
        </div>

        <div id="loading" style="display: none; margin: 20px 0;">
            <div class="loading"></div> Connecting to n8n...
        </div>

        <div id="response" class="response-box" style="display: none;"></div>
        
        <div id="emails" class="email-list" style="display: none;">
            <h2>📧 Mock Emails from n8n</h2>
            <div id="emailContent"></div>
        </div>
    </div>

    <script>
        const webhookUrl = 'http://localhost:5678/webhook/agenda-test';
        
        async function testWebhook() {
            const statusEl = document.getElementById('status');
            const responseEl = document.getElementById('response');
            const loadingEl = document.getElementById('loading');
            const emailsEl = document.getElementById('emails');
            
            // Show loading
            loadingEl.style.display = 'block';
            responseEl.style.display = 'none';
            emailsEl.style.display = 'none';
            statusEl.className = 'status info';
            statusEl.textContent = 'Connecting to n8n webhook...';
            
            const testData = {
                test: true,
                source: 'Agenda Dashboard Test Page',
                action: 'test-connection',
                timestamp: new Date().toISOString(),
                user: 'Test User'
            };
            
            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                // Update status
                statusEl.className = 'status success';
                statusEl.textContent = '✅ Successfully connected to n8n webhook!';
                
                // Show response
                responseEl.style.display = 'block';
                responseEl.textContent = JSON.stringify(data, null, 2);
                
                // Show mock emails if present
                if (data.mock_emails && data.mock_emails.length > 0) {
                    displayEmails(data.mock_emails);
                }
                
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = `❌ Error: ${error.message}`;
                
                responseEl.style.display = 'block';
                responseEl.textContent = `Error Details:\n${error.message}\n\nMake sure:\n1. n8n is running on port 5678\n2. The "Webhook test" workflow is ACTIVATED\n3. The webhook path is "agenda-test"`;
            } finally {
                loadingEl.style.display = 'none';
            }
        }
        
        async function testEmailDigest() {
            const statusEl = document.getElementById('status');
            const responseEl = document.getElementById('response');
            const loadingEl = document.getElementById('loading');
            
            loadingEl.style.display = 'block';
            responseEl.style.display = 'none';
            
            const testData = {
                action: 'email-digest',
                limit: 5
            };
            
            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                
                statusEl.className = 'status success';
                statusEl.textContent = '✅ Email digest retrieved!';
                
                responseEl.style.display = 'block';
                responseEl.textContent = JSON.stringify(data, null, 2);
                
                if (data.mock_emails) {
                    displayEmails(data.mock_emails);
                }
                
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = `❌ Error: ${error.message}`;
            } finally {
                loadingEl.style.display = 'none';
            }
        }
        
        function displayEmails(emails) {
            const emailsEl = document.getElementById('emails');
            const emailContent = document.getElementById('emailContent');
            
            emailsEl.style.display = 'block';
            emailContent.innerHTML = emails.map(email => `
                <div class="email-item">
                    <div class="email-from">${email.from}</div>
                    <div class="email-subject">${email.subject}</div>
                    <div class="email-snippet">${email.snippet}</div>
                    <div class="email-time">${new Date(email.time).toLocaleString()}</div>
                </div>
            `).join('');
        }
        
        function clearResults() {
            document.getElementById('status').className = 'status info';
            document.getElementById('status').textContent = 'Ready to test n8n webhook connection';
            document.getElementById('response').style.display = 'none';
            document.getElementById('emails').style.display = 'none';
        }
    </script>
</body>
</html>
