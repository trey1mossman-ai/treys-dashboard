  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- iOS PWA Detection Script -->
    <script>
      // Detect if running as iOS PWA
      if (window.navigator.standalone) {
        document.documentElement.classList.add('ios-pwa');
      }
      
      // Prevent overscroll/bounce on iOS
      document.addEventListener('touchmove', function(e) {
        if (!e.target.closest('.scroll-container')) {
          e.preventDefault();
        }
      }, { passive: false });
      
      // Add to home screen prompt for iOS
      if ('standalone' in window.navigator && !window.navigator.standalone && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
        const lastPrompt = localStorage.getItem('iosInstallPrompt');
        const now = Date.now();
        if (!lastPrompt || now - parseInt(lastPrompt) > 7 * 24 * 60 * 60 * 1000) { // Show once per week
          setTimeout(() => {
            if (confirm('Add Agenda Dashboard to your home screen for the best experience!')) {
              alert('Tap the share button below and select "Add to Home Screen"');
              localStorage.setItem('iosInstallPrompt', now.toString());
            }
          }, 5000);
        }
      }
    </script>
  </body>
