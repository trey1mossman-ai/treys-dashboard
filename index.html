<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <!-- Basic Meta Tags -->
    <title>Agenda Dashboard</title>
    <meta name="description" content="Personal productivity dashboard with agenda, workflows, and fitness tracking" />
    <meta name="author" content="Agenda Dashboard" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- iOS Specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Agenda" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="msapplication-TileColor" content="#000000" />
    
    <!-- Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Agenda Dashboard" />
    <meta property="og:description" content="Personal productivity dashboard with agenda, workflows, and fitness tracking" />
    <meta property="og:image" content="/icon-512.png" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agenda Dashboard" />
    <meta name="twitter:description" content="Personal productivity dashboard with agenda, workflows, and fitness tracking" />
    <meta name="twitter:image" content="/icon-512.png" />
    
    <!-- Prevent automatic detection of phone numbers, emails, etc -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="format-detection" content="address=no" />
    
    <!-- Preconnect to external domains if needed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- iOS PWA Detection Script -->
    <script>
      // Detect if running as iOS PWA
      if (window.navigator.standalone) {
        document.documentElement.classList.add('ios-pwa');
      }
      
      // Allow natural scrolling on iOS
      // Removed touchmove prevention that was blocking scrolling
      
      // Add to home screen prompt for iOS
      if ('standalone' in window.navigator && !window.navigator.standalone && /iPhone|iPad|iPod/.test(navigator.userAgent)) {
        const lastPrompt = localStorage.getItem('iosInstallPrompt');
        const now = Date.now();
        if (!lastPrompt || now - parseInt(lastPrompt) > 7 * 24 * 60 * 60 * 1000) { // Show once per week
          setTimeout(() => {
            if (confirm('Add Agenda Dashboard to your home screen for the best experience!')) {
              alert('Tap the share button below and select "Add to Home Screen"');
              localStorage.setItem('iosInstallPrompt', now.toString());
            }
          }, 5000);
        }
      }
    </script>
  </body>
</html>
