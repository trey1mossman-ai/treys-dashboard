<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Trey's Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(180deg, #0F0F14 0%, #1A1A24 100%);
      color: #E5E5EA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
      animation: fadeIn 0.5s ease-out;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #A884FF 0%, #00D6FF 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(168, 132, 255, 0.3);
    }
    
    .icon::before {
      content: "📡";
      font-size: 40px;
      filter: grayscale(1) brightness(0.5);
    }
    
    h1 {
      color: #A884FF;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    
    p {
      opacity: 0.8;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    
    button {
      background: linear-gradient(135deg, #A884FF 0%, #8A66FF 100%);
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(168, 132, 255, 0.3);
      min-height: 44px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(168, 132, 255, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .status {
      margin-top: 2rem;
      font-size: 0.875rem;
      opacity: 0.6;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
    }
    
    .loading {
      animation: pulse 2s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"></div>
    <h1>You're Offline</h1>
    <p>Don't worry! Your dashboard data is saved locally and will sync when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
    <div class="status loading">Checking connection...</div>
  </div>
  
  <script>
    // Check connection periodically
    setInterval(() => {
      fetch('/').then(() => {
        location.reload();
      }).catch(() => {
        console.log('Still offline');
      });
    }, 5000);
    
    // Update status message
    setTimeout(() => {
      document.querySelector('.status').textContent = 'Waiting for connection...';
    }, 3000);
  </script>
</body>
</html>
