name = "agenda-dashboard"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "agenda-dashboard"
database_id = "6b67d1d6-bbec-4a13-922e-a6e8dd24c533"

# KV Namespaces
[[kv_namespaces]]
binding = "AGENDA_KV"
id = "78bf1548c9a549009efd9d42ddfd5e5c"

[[kv_namespaces]]
binding = "TRAINER_KV"
id = "ae4c22b7500545ce99f89cefd1b88644"

[[kv_namespaces]]
binding = "CACHE"
id = "ed2c6b469db64da5908ca397b1365406"

[[kv_namespaces]]
binding = "AI_TOOLS"
id = "1fd010d7b1194d6080152e02a2b982a1"
preview_id = "1ed90bf61a7a4aa5adc7c5cea33c8c45"

[[kv_namespaces]]
binding = "AI_LOGS"
id = "6559f840ea1c4551b12e81260d08859b"

[[kv_namespaces]]
binding = "AI_EMBEDDINGS"
id = "e7c1a4642389481da60e82a1e03d503b"

# Environment variables (non-sensitive)
[vars]
DASHBOARD_BASE_URL = "https://ailifeassistanttm.com"
TZ = "America/Denver"
NODE_ENV = "production"
PORT = "8080"
TRUST_PROXY = "1"
EVENTS_ENABLED = "true"
EVENTS_KEEPALIVE_MS = "15000"
CSP_ENABLED = "true"
HSTS_MAXAGE = "31536000"
BODY_LIMIT_BYTES = "524288"
SUPPLEMENTS_SOURCE = "sheet"
WORKOUT_SOURCE = "trainer"

# Legacy variables (maintained for compatibility)
VITE_PUBLIC_ORIGIN = "https://agenda-dashboard.pages.dev"
PROVIDER = "openai"
OPENAI_BASE_URL = "https://api.openai.com/v1"
OPENAI_MODEL = "gpt-4o"
ANTHROPIC_BASE_URL = "https://api.anthropic.com/v1"
ANTHROPIC_MODEL = "claude-3-5-sonnet-20241022"
RAG_STORE = "kv"
ENABLE_REALTIME = "false"

# Routes (optional - if using custom domain)
# [[routes]]
# pattern = "agenda.yourdomain.com/*"
# zone_name = "yourdomain.com"

# Development settings
[dev]
port = 8788
local_protocol = "http"

# Add your secrets via CLI (DO NOT put them in this file):
# Required for machine auth:
# wrangler secret put CF_ACCESS_CLIENT_ID
# wrangler secret put CF_ACCESS_CLIENT_SECRET  
# wrangler secret put DASHBOARD_HMAC_SECRET

# Optional for data sources:
# wrangler secret put SUPPLEMENTS_SHEET_ID
# wrangler secret put SUPPLEMENTS_SHEET_RANGE  
# wrangler secret put WORKOUT_SHEET_ID
# wrangler secret put WORKOUT_SHEET_RANGE
# wrangler secret put TRAINER_API_URL
# wrangler secret put TRAINER_API_KEY

# Legacy secrets (maintained for compatibility):
# wrangler secret put OPENAI_API_KEY
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put SENDGRID_API_KEY
# wrangler secret put TWILIO_ACCOUNT_SID
# wrangler secret put TWILIO_AUTH_TOKEN
# wrangler secret put TWILIO_PHONE_NUMBER
# wrangler secret put DEFAULT_FROM_EMAIL